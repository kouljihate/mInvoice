{% extends 'base.html' %}
{% block title %}Setup{% endblock %}
{% block content %}
<div class="row justify-content-center mt-3">
  <div class="col-md-8">
    <div class="text-center mb-4">
      <h4 class="mb-1"><i class="bi bi-gear"></i> Company Setup</h4>
      <p class="text-muted small">Set up your company</p>
    </div>
    <form method="post">
      <div class="card shadow-sm mb-3">
        <div class="card-body p-4">
          <h6 class="card-title text-primary mb-3"><i class="bi bi-building"></i> Company Information</h6>
          <div class="row g-3">
            <div class="col-md-6"><input name="name" class="form-control" placeholder="Company Name" required></div>
            <div class="col-md-6"><input name="currency" class="form-control" value="MAD" placeholder="Currency"></div>
            <div class="col-12"><input name="address" class="form-control" placeholder="Address"></div>
            <div class="col-md-4"><input name="city" class="form-control" placeholder="City"></div>
            <div class="col-md-4"><input name="postal_code" class="form-control" placeholder="Postal Code"></div>
            <div class="col-md-4"><input name="phone" class="form-control" placeholder="Phone"></div>
            <div class="col-12"><input name="email" class="form-control" placeholder="Email" type="email"></div>
          </div>
        </div>
      </div>
      <div class="card shadow-sm mb-3">
        <div class="card-body p-4">
          <h6 class="card-title text-primary mb-3"><i class="bi bi-receipt"></i> Moroccan Tax Info</h6>
          <div class="row g-3">
            <div class="col-md-4"><input name="tax_id" class="form-control" placeholder="Tax ID"></div>
            <div class="col-md-4"><input name="ice" class="form-control" placeholder="ICE"></div>
            <div class="col-md-4"><input name="rc" class="form-control" placeholder="RC"></div>
            <div class="col-md-4"><input name="if_tax" class="form-control" placeholder="IF"></div>
            <div class="col-md-4"><input name="tp" class="form-control" placeholder="TP"></div>
            <div class="col-md-4"><input name="cnss" class="form-control" placeholder="CNSS"></div>
            <div class="col-12"><input name="bank_account" class="form-control" placeholder="Bank Account Number"></div>
            <div class="col-12"><input name="slogan" class="form-control" placeholder="Slogan"></div>
          </div>
        </div>
      </div>
      <div class="card shadow-sm mb-3">
        <div class="card-body p-4">
          <h6 class="card-title text-primary mb-3"><i class="bi bi-person-badge"></i> Admin Account</h6>
          <div class="row g-3">
            <div class="col-md-4"><input name="username" class="form-control" value="admin" placeholder="Username"></div>
            <div class="col-md-4"><input name="password" class="form-control" value="admin" placeholder="Password" type="password"></div>
            <div class="col-md-4"><input name="full_name" class="form-control" value="Admin" placeholder="Full Name"></div>
          </div>
        </div>
      </div>
      <div class="card shadow-sm mb-3">
        <div class="card-body p-4">
          <h6 class="card-title text-primary mb-3"><i class="bi bi-file-text"></i> Invoice Template</h6>
          <p class="text-muted small">Enable or disable invoice layout sections:</p>
          <div class="row g-2">
            <div class="col-md-6">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="section_header_company_info" id="s1" checked>
                <label class="form-check-label" for="s1">Company Info (Logo+Name+Address+Email+ICE)</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="section_header_customer_info" id="s2" checked>
                <label class="form-check-label" for="s2">Customer Info (Name+Address)</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="section_body_title" id="s3" checked>
                <label class="form-check-label" for="s3">Title: INVOICE + Number + Date</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="section_body_attention" id="s4" checked>
                <label class="form-check-label" for="s4">Attention To</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="section_body_items_table" id="s5" checked>
                <label class="form-check-label" for="s5">Items Table</label>
              </div>
            </div>
            <div class="col-md-6">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="section_body_note1" id="s6" checked>
                <label class="form-check-label" for="s6">Note 1</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="section_body_note2" id="s7" checked>
                <label class="form-check-label" for="s7">Note 2</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="section_footer_left" id="s8" checked>
                <label class="form-check-label" for="s8">Footer Left (Name+Address+Phone+Email)</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="section_footer_right" id="s9" checked>
                <label class="form-check-label" for="s9">Footer Right (IF+TP+RC)</label>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="text-center">
        <button type="submit" class="btn btn-primary px-4">Save &amp; Continue</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
