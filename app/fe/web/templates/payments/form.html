{% extends 'base.html' %}
{% block title %}{{ tr('edit_payment') }}{% endblock %}
{% block content %}
<h5 class="mb-3"><i class="bi bi-pencil"></i> {{ tr('edit_payment') }}</h5>
<form method="post">
  <div class="card">
    <div class="card-body">
      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label class="form-label">{{ tr('payment_number') if tr('payment_number') != 'payment_number' else 'Number' }}</label>
          <input class="form-control" value="{{ payment.payment_number }}" readonly disabled>
        </div>
        <div class="col-md-6">
          <label class="form-label">{{ tr('invoice') }}</label>
          <a href="{{ url_for('invoices.view_invoice', id=payment.invoice_id) }}" class="form-control-plaintext text-decoration-none">INV #{{ payment.invoice_id }}</a>
        </div>
        <div class="col-md-4">
          <label class="form-label">{{ tr('amount') }}</label>
           <input class="form-control" value="{{ '%.2f'|format(payment.amount) }} MAD" readonly disabled>
        </div>
        <div class="col-md-4">
          <label class="form-label">{{ tr('date') }}</label>
          <input class="form-control" value="{{ payment.date }}" readonly disabled>
        </div>
        <div class="col-md-4">
          <label class="form-label">{{ tr('method') }}</label>
          <input class="form-control" value="{{ payment.method }}" readonly disabled>
        </div>
        <div class="col-md-6">
          <label class="form-label">{{ tr('status') }}</label>
          <select name="status" class="form-select">
            <option value="draft" {% if payment.status == 'draft' %}selected{% endif %}>{{ tr('status_draft') }}</option>
            <option value="waiting" {% if payment.status == 'waiting' %}selected{% endif %}>{{ tr('status_waiting') }}</option>
            <option value="completed" {% if payment.status == 'completed' %}selected{% endif %}>{{ tr('status_completed') }}</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">{{ tr('reference') }}</label>
          <input class="form-control" value="{{ payment.reference or '-' }}" readonly disabled>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">{{ tr('notes') }}</label>
        <textarea class="form-control" rows="2" readonly disabled>{{ payment.notes or '-' }}</textarea>
      </div>
    </div>
  </div>
  <div class="mt-3">
    <button type="submit" class="btn btn-primary"><i class="bi bi-check"></i> {{ tr('save') }}</button>
    <a href="{{ url_for('payments.list_payments') }}" class="btn btn-outline-secondary">{{ tr('cancel') }}</a>
  </div>
</form>
{% endblock %}
